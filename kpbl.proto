            int64 guild_zhanli = 18;      // 18074701718834 (18.07T)
            string guild_uuid = 19;       // "GUILD-135474-..."
            int32 server_id = 20;         // 400019
            int32 weekly_donation = 22;   // 31050 (本周捐献值 🔥)
            int32 field23 = 23;           // 139120
        }
        // field 2: 成员信息 (repeated, 每个成员一条)
        message type_member_info {
            int32 member_id = 1;          // 108153
            string member_name = 2;       // "zombieCAT"
            int32 field3 = 3;             // 1032
            int32 field4 = 4;             // 2026
            int32 field5 = 5;             // 1
            int32 last_active_time = 6;   // 1773111070 (最后活跃时间戳)
            int32 role = 7;               // 2=副会长, 4=成员 (1=会长)
            int32 level = 8;              // 221 (成员等级)
            int64 member_zhanli = 11;     // 583465117851 (583.46B)
            int32 join_time = 13;         // 1742443084 (加入时间)
            int32 field14 = 14;           // 500
            int32 contribution = 15;      // 1090 (🔥贡献值)
            int32 is_online = 20;         // 1=在线
            int32 field26 = 26;           // 2
        }
        type_guild_detail guild_detail = 1;
        repeated type_member_info members = 2;
    }
    type_guild_basic guild_basic = 3;

    // field 4: 公会活动/捐献信息
    message type_guild_activity {
        // field 2: 任务1
        message type_task {
            message type_task_reward {
                int32 field2 = 2;
                int32 field3 = 3;
            }
            int32 task_id = 1;
            int32 field2 = 2;
            int32 field4 = 4;
            type_task_reward reward = 7;
            int32 field8 = 8;
            int32 field9 = 9;
        }
        // field 4: 商店信息
        message type_shop {
            message type_shop_item {
                int32 item_type = 1;
                int32 item_id = 2;
                int32 item_price = 3;
            }
            int32 field2 = 2;
            repeated type_shop_item items = 6;
        }
        // field 7: 公会战/Boss信息
        message type_guild_battle {
            message type_battle_player {
                int32 field1 = 1;
                int64 field2 = 2;
            }
            message type_donate_level {
                int32 level_id = 1;
                int64 target = 2;
                int64 current = 3;
                int32 field5 = 5;
                int32 field6 = 6;
            }
            int32 field4 = 4;
            int32 field6 = 6;
            int32 field7 = 7;
            int32 field8 = 8;
            int32 field9 = 9;
            int32 field10 = 10;
            int32 field11 = 11;
            int64 field12 = 12;
            int64 field13 = 13;
            int32 field16 = 16;
            type_battle_player field17 = 17;
            repeated type_donate_level donate_levels = 18;
            int32 field21 = 21;
            int32 field22 = 22;
            int32 field23 = 23;
            int32 field24 = 24;
            int32 field25 = 25;
            int32 field28 = 28;
            int32 field29 = 29;
            int32 field32 = 32;
        }
        // field 12: 未知
        message type_field12 {
            int32 field3 = 3;
        }
        // field 16: 捐献状态
        message type_donate_status {
            int32 donate_count = 1;
            int32 donate_time = 2;
            int32 field3 = 3;
            int32 field4 = 4;
            int32 field5 = 5;
            int32 field8 = 8;
            int32 field9 = 9;
        }
        type_task task1 = 2;
        type_task task2 = 3;
        type_shop shop = 4;
        int32 start_time = 5;
        int32 end_time = 6;
        type_guild_battle guild_battle = 7;
        int32 field8 = 8;
        int32 field9 = 9;
        type_field12 field12 = 12;
        int32 field14 = 14;
        int32 field15 = 15;
        type_donate_status donate_status = 16;
    }
    type_guild_activity guild_activity = 4;

    // field 7: 版本信息
    message type_version_info {
        message type_version_detail {
            int32 field1 = 1;
            int32 field2 = 2;
        }
        type_version_detail version_detail = 1;
    }
    type_version_info version_info = 7;

    // field 9: 时间戳
    int32 timestamp = 9;
}

// 种花/活动列表响应 (proto1)
message hd_jslx_response {
    // 内部条目详情 (field 3/4/6 共用的子结构)
    message type_entry_detail {
        int32 entry_id = 1;       // 活动/赛季ID，如 20259, 20257, 11038 等（动态值）
        bytes entry_bytes = 2;    // 特征值，如 "\320\360\001"，可用于定位
        int32 entry_type = 4;     // 类型
        int32 start_time = 5;     // 开始时间戳
        int32 end_time = 6;       // 结束时间戳
        int32 count = 8;          // 数量/进度
        int32 category = 10;      // 分类标记: 1 或 8
    }

    // field 2: 基础信息
    message type_basic_info {
        message type_inner {
            int32 field1 = 1;
            int32 field2 = 2;     // 如 5290288
        }
        type_inner inner = 1;
    }

    // field 3: 带积分的条目
    message type_score_entry {
        type_entry_detail detail = 1;
        int32 score = 3;          // 积分/进度值，如 10000, 346200
    }

    // field 4: 普通条目
    message type_normal_entry {
        type_entry_detail detail = 1;
    }

    // field 6: 排名/排行条目
    message type_rank_entry {
        type_entry_detail detail = 1;
    }

    type_basic_info basic_info = 2;
    repeated type_score_entry score_entries = 3;
    repeated type_normal_entry normal_entries = 4;
    repeated type_rank_entry rank_entries = 6;
}

// 日常任务面板响应 (hexstringheader: 0529)
message daily_task_response {
    message task_item {
        int32 task_id = 1;      // 任务编号
        int32 progress = 2;     // 完成进度/次数
        int32 completed = 3;    // 是否已完成
        int32 claimed = 4;      // 是否已领取
    }
    message weekly_task_item {
        int32 task_id = 1;      // 周任务编号 (2001, 3001, 6001, 9001等)
    }
    message task_list {
        repeated task_item daily_tasks = 1;     // 日常任务列表
        repeated weekly_task_item weekly_tasks = 2;  // 周任务列表
    }
    task_list tasks = 2;        // 任务数据
    int32 daily_activity = 3;   // 日活跃度
    int32 weekly_activity = 4;  // 周活跃度
    int32 reset_time = 5;       // 重置时间戳
}

