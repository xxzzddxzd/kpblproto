// 游历响应
message youli_response {

    message type_huodong {
        int64 stepid = 1;
        message NestedMessage {
            // 字段1可能表示某种ID或时间戳，不同实例有不同值
            int64 entity_id = 1;
            
            // 字段3在所有实例中值都是910021
            int64 type_id = 3;
            
            // 字段4在所有实例中值都是1
            int64 flag = 4;
            
            //message Field5Data {
            // 字段编号非常大，可能是某种特殊的编码
            //int64 data = 218322000;  // 所有实例中值都是4000029
            //}
            bytes metadata = 5;
        }
        
        NestedMessage content = 2;
    }

    repeated type_huodong huodonglist1 = 7;  // 活动1出现的step
}

